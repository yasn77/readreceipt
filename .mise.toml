[settings]
# Use uv to create and manage virtual environments
python.uv_venv_auto = "create|source"

[env]
# Project configuration
PROJECT_NAME = "readreceipt"
PYTHON_VERSION = "3.11"

# Application environment variables
ADMIN_TOKEN = "{{ env.ADMIN_TOKEN | default='change-me-in-production' }}"
SQLALCHEMY_DATABASE_URI = "{{ env.SQLALCHEMY_DATABASE_URI | default='sqlite:///db.sqlite3' }}"
FLASK_ENV = "{{ env.FLASK_ENV | default='development' }}"
FLASK_DEBUG = "{{ env.FLASK_DEBUG | default='1' }}"
PORT = "{{ env.PORT | default='5000' }}"
LOG_LEVEL = "{{ env.LOG_LEVEL | default='INFO' }}"

# Extension configuration
EXTENSION_ALLOWED_ORIGINS = "{{ env.EXTENSION_ALLOWED_ORIGINS | default='https://mail.google.com' }}"

[tools]
# Python version
python = "3.11"

# Package manager
uv = "latest"

# Linting and formatting
ruff = "latest"
black = "latest"

# Type checking
mypy = "latest"

# Testing
pytest = "latest"
pytest-cov = "latest"

# Pre-commit
pre-commit = "latest"

[tasks]
# Installation tasks
[tasks.install]
description = "Install all dependencies"
alias = "i"
run = "uv pip install -r requirements.txt"

[tasks.install-dev]
description = "Install development dependencies and pre-commit hooks"
run = "uv pip install -r requirements.txt && pre-commit install"

# Running tasks
[tasks.run]
description = "Run the Flask application"
alias = "start"
run = "python app.py"

[tasks.dev]
description = "Run Flask in development mode with auto-reload"
run = "flask --app app.py run --debug --host=0.0.0.0 --port={{ env.PORT | default='5000' }}"

# Testing tasks
[tasks.test]
description = "Run all tests"
alias = "t"
run = "pytest tests/"

[tasks.test-cov]
description = "Run tests with coverage"
alias = "tc"
run = "pytest tests/ --cov=app --cov-report=term-missing"

[tasks.test-html]
description = "Run tests with HTML coverage report"
run = "pytest tests/ --cov=app --cov-report=html"

# Linting tasks
[tasks.lint]
description = "Lint code with ruff"
alias = "l"
run = "ruff check ."

[tasks.format]
description = "Format code with black"
alias = "fmt"
run = "black ."

[tasks.format-check]
description = "Check code formatting"
run = "black --check ."

[tasks.typecheck]
description = "Type check with mypy"
alias = "tc"
run = "mypy . --ignore-missing-imports"

# Pre-commit tasks
[tasks.precommit]
description = "Run pre-commit hooks on all files"
run = "pre-commit run --all-files"

# Utility tasks
[tasks.clean]
description = "Clean Python cache and build artifacts"
run = """
find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
find . -type f -name "*.pyc" -delete 2>/dev/null || true
find . -type f -name "*.pyo" -delete 2>/dev/null || true
find . -type d -name "*.egg-info" -exec rm -rf {} + 2>/dev/null || true
rm -rf .pytest_cache .coverage htmlcov/ .mypy_cache/ 2>/dev/null || true
echo "Cleaned Python cache and build artifacts"
"""

[tasks.clean-venv]
description = "Remove virtual environment"
run = "rm -rf .venv && echo 'Virtual environment removed'"

[tasks.reset]
description = "Clean and reinstall dependencies"
depends = ["clean", "install"]

[tasks.info]
description = "Show project information"
run = """
echo "Project: $PROJECT_NAME"
echo "Python Version: $(python --version)"
echo "Virtual Environment: ${VIRTUAL_ENV:-Not activated}"
echo "UV Version: $(uv --version 2>&1 | head -1)"
echo ""
echo "Environment:"
echo "  ADMIN_TOKEN: ${ADMIN_TOKEN:-not set}"
echo "  SQLALCHEMY_DATABASE_URI: ${SQLALCHEMY_DATABASE_URI:-not set}"
echo "  FLASK_ENV: ${FLASK_ENV:-not set}"
echo ""
echo "Available tasks:"
mise task list --all
"""

[tasks.docs]
description = "Serve documentation locally"
run = "mkdocs serve"

[tasks.build-docs]
description = "Build documentation"
run = "mkdocs build"

[tasks.shell]
description = "Spawn a shell with the project environment activated"
alias = "sh"
run = "exec $SHELL"
