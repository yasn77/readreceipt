name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # Security scanning (Issue #110)
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install safety bandit

      - name: Check dependencies for vulnerabilities
        run: |
          safety check -r requirements.txt || true

      - name: Run bandit security scan
        run: |
          bandit -r . -x tests/,migrations/,admin-dashboard/,extensions/ || true

  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          install: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff black mypy pytest pytest-cov pre-commit

      - name: Cache pre-commit
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit hooks
        run: |
          pre-commit run --all-files || (git diff; exit 1)

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy . --ignore-missing-imports

      - name: Test with pytest
        run: pytest

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  extension-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install extension dependencies
        run: |
          if [ -d "extensions" ]; then
            cd extensions
            npm ci || echo "No package.json found in extensions"
          fi

      - name: Build extensions
        run: |
          if [ -f "extensions/package.json" ]; then
            cd extensions
            npm run build || echo "No build script found"
          fi

      - name: Validate manifest.json
        run: |
          python -c "import json; json.load(open('manifest.json'))" || echo "manifest.json validation skipped"

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install admin-dashboard dependencies
        run: |
          if [ -d "admin-dashboard" ] && [ -f "admin-dashboard/package.json" ]; then
            cd admin-dashboard
            npm ci
          else
            echo "admin-dashboard not initialized or no package.json"
          fi

      - name: Run frontend tests
        run: |
          if [ -d "admin-dashboard" ] && [ -f "admin-dashboard/package.json" ]; then
            cd admin-dashboard
            npm test -- --coverage || echo "No tests found in admin-dashboard"
          fi
