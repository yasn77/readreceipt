name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Security scanning (Issue #110)
  security-scan:
    runs-on: readreceipt
    steps:
      - uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          install: true

      - name: Install security tools
        run: mise run install

      - name: Check dependencies for vulnerabilities
        run: |
          mise run security || true

      - name: Run bandit security scan
        run: |
          bandit -r . -x tests/,migrations/,admin-dashboard/,extensions/ || true

  # Backend tests with Python matrix
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          install: true

      - name: Set up Python ${{ matrix.python-version }}
        run: mise use python@${{ matrix.python-version }}

      - name: Cache mise tools
        uses: actions/cache@v5
        with:
          path: ~/.local/share/mise
          key: mise-tools-${{ runner.os }}-${{ hashFiles('mise.toml') }}-${{ matrix.python-version }}
          restore-keys: |
            mise-tools-${{ runner.os }}-${{ hashFiles('mise.toml') }}-
            mise-tools-${{ runner.os }}-

      - name: Cache .venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('requirements.txt', 'pyproject.toml') }}
          restore-keys: |
            venv-${{ runner.os }}-py${{ matrix.python-version }}-
            venv-${{ runner.os }}-

      - name: Install dependencies
        run: mise run install

      - name: Lint with ruff
        run: mise run lint

      - name: Test with pytest
        run: mise run test

      - name: Generate coverage report
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term
        if: matrix.python-version == '3.12'

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        if: matrix.python-version == '3.12'
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7

  # Frontend tests with Node matrix
  frontend-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18", "20", "22"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          install: true

      - name: Set up Node.js ${{ matrix.node-version }}
        run: mise use node@${{ matrix.node-version }}

      - name: Cache mise tools
        uses: actions/cache@v5
        with:
          path: ~/.local/share/mise
          key: mise-tools-${{ runner.os }}-${{ hashFiles('mise.toml') }}-${{ matrix.node-version }}
          restore-keys: |
            mise-tools-${{ runner.os }}-${{ hashFiles('mise.toml') }}-
            mise-tools-${{ runner.os }}-

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: admin-dashboard/node_modules
          key: node-modules-${{ runner.os }}-node${{ matrix.node-version }}-${{ hashFiles('admin-dashboard/package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-node${{ matrix.node-version }}-
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        run: |
          cd admin-dashboard
          npm install

      - name: Run frontend tests
        run: |
          cd admin-dashboard
          npm test -- --coverage || echo "No tests found in admin-dashboard"

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v7
        if: matrix.node-version == '20'
        with:
          name: frontend-coverage-node${{ matrix.node-version }}
          path: admin-dashboard/coverage
          retention-days: 7

  # Extension tests
  extension-tests:
    runs-on: readreceipt
    steps:
      - uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          install: true

      - name: Set up Node.js
        run: mise use node@20

      - name: Install extension dependencies
        run: |
          if [ -d "extensions" ]; then
            cd extensions
            npm ci || echo "No package.json found in extensions"
          fi

      - name: Build extensions
        run: |
          if [ -f "extensions/package.json" ]; then
            cd extensions
            npm run build || echo "No build script found"
          fi

      - name: Validate manifest.json
        run: |
          python -c "import json; json.load(open('manifest.json'))" || echo "manifest.json validation skipped"

  # Upload coverage to Codecov (after all tests complete)
  upload-coverage:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v6

      - name: Download backend coverage
        uses: actions/download-artifact@v8
        with:
          name: coverage-report-py3.12

      - name: Download frontend coverage
        uses: actions/download-artifact@v8
        with:
          name: frontend-coverage-node20
          path: admin-dashboard/coverage

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true
