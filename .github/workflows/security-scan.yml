name: Security Scanning

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    # Run weekly security scans on Sundays at 00:00 UTC
    - cron: '0 0 * * 0'

jobs:
  # Dependency vulnerability scanning with Safety
  dependency-scan:
    runs-on: readreceipt
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install safety
        run: |
          python -m pip install --upgrade pip
          pip install safety

      - name: Check dependencies for vulnerabilities
        run: |
          safety check -r requirements.txt --json > safety-report.json || true
          safety check -r requirements.txt --full-report || true

      - name: Upload safety report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: safety-report
          path: safety-report.json
          retention-days: 30

  # Static code security analysis with Bandit
  code-scan:
    runs-on: readreceipt
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Run bandit security scan
        run: |
          bandit -r . -x tests/,migrations/,admin-dashboard/,extensions/ -f json -o bandit-report.json || true
          bandit -r . -x tests/,migrations/,admin-dashboard/,extensions/ || true

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

  # Container security scanning with Trivy
  container-scan:
    runs-on: readreceipt
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          vuln-type: 'os,library'

  # Dependency review for PRs
  dependency-review:
    runs-on: readreceipt
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - name: 'Dependency Review'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0
