repos:
  # Lightweight checks only - fast pre-commit validation
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^helm/
      - id: check-json
      - id: check-added-large-files
      - id: detect-private-key

  # Fast formatting checks only
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        exclude: ^(\.venv|venv|env|\.git|__pycache__|node_modules|migrations|helm|admin-dashboard|extensions)/
      - id: ruff-format
        exclude: ^(\.venv|venv|env|\.git|__pycache__|node_modules|migrations|helm|admin-dashboard|extensions)/
