[tool.black]
line-length = 88
target-version = ["py311"]
exclude = '''
/(
    __pycache__
    | migrations
    | helm
    | node_modules
    | admin-dashboard
    | extensions
    | \\.venv
    | venv
    | env
    | \\.git
    | \\.pytest_cache
    | \\.mypy_cache
    | build
    | dist
)/
'''

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = false
strict_equality = true
exclude = [
    "migrations",
    "admin-dashboard",
    "extensions",
    ".venv",
    "venv",
    "env",
    "__pycache__",
    ".pytest_cache",
    ".mypy_cache",
    "build",
    "dist",
    "node_modules",
    "helm",
    "tests",  # Optional: skip type-checking tests
]
disable_error_code = ["import-untyped"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "--cov=app --cov-report=term-missing --cov-fail-under=70 -v"

[tool.coverage.run]
source = ["."]
omit = [
    "tests/*",
    "*/migrations/*",
    "*/__pycache__/*",
    "*/site-packages/*",
    "admin-dashboard/*",
    "extensions/*",
    "venv/*",
    ".venv/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]
fail_under = 70
show_missing = true

# Override for OIDC provider module - allow arg-type due to Any in token dicts
[[tool.mypy.overrides]]
module = "oidc_provider"
disable_error_code = ["arg-type"]
